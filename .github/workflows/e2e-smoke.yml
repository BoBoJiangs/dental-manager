name: e2e-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  pull_request:
    paths:
      - "src/**"
      - "frontend/admin-web/**"
      - "sql/**"
      - "docker-compose.yml"
      - ".github/workflows/e2e-smoke.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/admin-web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend/admin-web
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend/admin-web
        run: npx playwright install --with-deps chromium

      - name: Start Docker Dependencies
        run: docker compose up -d

      - name: Wait for Service Health
        shell: bash
        run: |
          set -euo pipefail
          containers=(dental-mysql dental-redis dental-rabbitmq dental-minio)
          for container in "${containers[@]}"; do
            echo "Waiting for ${container} to become healthy..."
            for i in {1..60}; do
              status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${container}")"
              if [[ "${status}" == "healthy" || "${status}" == "running" ]]; then
                echo "${container} is ${status}"
                break
              fi
              if [[ "${i}" -eq 60 ]]; then
                echo "Timeout waiting for ${container}"
                docker logs "${container}" || true
                exit 1
              fi
              sleep 2
            done
          done

      - name: Init Database
        shell: bash
        run: |
          set -euo pipefail
          docker exec -i dental-mysql mysql -uroot -proot dental_mgmt < sql/01_schema.sql
          docker exec -i dental-mysql mysql -uroot -proot dental_mgmt < sql/02_init_data.sql

      - name: Start Backend
        shell: bash
        run: |
          set -euo pipefail
          nohup mvn -B -q -DskipTests spring-boot:run > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait Backend Ready
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..120}; do
            if curl -sf "http://127.0.0.1:8080/api/auth/health" > /dev/null; then
              echo "Backend is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time."
          tail -n 200 backend.log || true
          exit 1

      - name: Start Frontend
        working-directory: frontend/admin-web
        shell: bash
        run: |
          set -euo pipefail
          nohup npm run dev -- --host 127.0.0.1 --port 5173 > ../../frontend.log 2>&1 &
          echo $! > ../../frontend.pid

      - name: Wait Frontend Ready
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..90}; do
            if curl -sf "http://127.0.0.1:5173/login" > /dev/null; then
              echo "Frontend is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time."
          tail -n 200 frontend.log || true
          exit 1

      - name: Run Playwright Smoke
        working-directory: frontend/admin-web
        run: npm run test:e2e

      - name: Upload E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          if-no-files-found: ignore
          path: |
            backend.log
            frontend.log
            frontend/admin-web/test-results
            frontend/admin-web/playwright-report

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -f backend.pid ]]; then kill "$(cat backend.pid)" 2>/dev/null || true; fi
          if [[ -f frontend.pid ]]; then kill "$(cat frontend.pid)" 2>/dev/null || true; fi
          pkill -f "spring-boot:run" || true
          pkill -f "vite --host 127.0.0.1 --port 5173" || true
          docker compose down -v || true
