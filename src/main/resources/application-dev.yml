server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/dental_mgmt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
  flyway:
    enabled: false

dental:
  minio:
    endpoint: http://127.0.0.1:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: dental-dev
  jwt:
    issuer: dental-management-system-dev
    secret: ChangeMeToA32CharacterOrLongerSecretKey123456
    access-token-expire-minutes: 120
  messaging:
    sms-enabled: false
  sms:
    aliyun:
      enabled: false
      mock-enabled: true
      endpoint: https://dysmsapi.aliyuncs.com
      region-id: cn-hangzhou
      default-sign-name: 牙科门诊
