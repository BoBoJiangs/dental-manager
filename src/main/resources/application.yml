server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: dental-management-system
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/dental_mgmt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 5s
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.company.dental.modules
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

dental:
  jwt:
    issuer: dental-management-system
    secret: ChangeMeToA32CharacterOrLongerSecretKey123456
    access-token-expire-minutes: 120
    header-name: Authorization
    token-prefix: "Bearer "
  minio:
    endpoint: http://127.0.0.1:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: dental-dev

logging:
  level:
    com.company.dental: info

---
# 初始化登录账号依赖 sql/02_init_data.sql 中的 user_account 数据。
# 其中密码采用 Spring Security DelegatingPasswordEncoder 可识别的 {noop} 前缀，
# 例如 admin / Admin@123456 仅用于本地开发联调。
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    enabled: false
