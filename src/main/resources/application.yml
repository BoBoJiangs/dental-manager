server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: dental-management-system
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      timeout: 5s
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.company.dental.modules
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

dental:
  jwt:
    access-token-expire-minutes: 120
    header-name: Authorization
    token-prefix: "Bearer "
  messaging:
    sms-enabled: false
  biz-no:
    key-prefix: biz:no
    date-pattern: yyyyMMdd
    sequence-length: 5
    expire-days: 2
    prefixes:
      PATIENT: P
      APPOINTMENT: A
      MEDICAL_RECORD: MR
      CHARGE_ORDER: C
      MEMBER_ACCOUNT: M
      TREATMENT_PLAN: TP
      CASHIER_SHIFT: CS
      QUEUE: Q
      PAYMENT: PM
      REFUND: RF
  sms:
    aliyun:
      enabled: false
      mock-enabled: true
      endpoint: https://dysmsapi.aliyuncs.com
      region-id: cn-hangzhou

logging:
  level:
    com.company.dental: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [trace:%X{traceId:-} req:%X{requestId:-}] %logger{36} - %msg%n"
